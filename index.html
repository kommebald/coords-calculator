<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Coord Converter | Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: rgba(20, 20, 20, 0.8);
            --accent-color: #e63946; /* Nether/Red Accent */
            --text-color: #ffffff;
            --border-glow: rgba(230, 57, 70, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1a0505 0%, #000000 100%);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Hintergrund-Animation für "Nether-Vibe" */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent-color);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.1; }
            to { transform: scale(1.5); opacity: 0.2; }
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px var(--border-glow);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 { font-weight: 700; letter-spacing: -1px; margin-bottom: 2rem; }
        .mode-text { font-size: 0.9rem; color: #888; margin-bottom: 0.5rem; text-transform: uppercase; }

        .switch-btn {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
            margin-bottom: 1.5rem;
        }

        .switch-btn:hover {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 0 15px var(--accent-color);
        }

        .input-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 0.8rem; opacity: 0.7; }
        
        input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent-color); }

        .result-box {
            background: rgba(230, 57, 70, 0.1);
            padding: 1.5rem;
            border-radius: 12px;
            margin-top: 2rem;
            border: 1px dashed var(--accent-color);
        }

        .result-val { font-size: 1.5rem; font-weight: bold; color: var(--accent-color); }

        .footer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <h1 id="title">Coordinate Converter</h1>
        
        <div class="mode-text" id="mode-label">Overworld ➔ Nether</div>
        <button class="switch-btn" onclick="toggleMode()">Modus wechseln ⇄</button>

        <div class="input-group">
            <label>X-Koordinate</label>
            <input type="number" id="xIn" placeholder="0" oninput="convert()">
        </div>
        <div class="input-group">
            <label>Z-Koordinate</label>
            <input type="number" id="zIn" placeholder="0" oninput="convert()">
        </div>

        <div class="result-box">
            <div style="font-size: 0.8rem; margin-bottom: 5px; opacity: 0.8;">Ergebnis:</div>
            <div class="result-val" id="output">X: 0 | Z: 0</div>
        </div>
    </div>

    <div class="footer">made by kommebald</div>

    <script>
        let isOverworldToNether = true;

        function toggleMode() {
            isOverworldToNether = !isOverworldToNether;
            const label = document.getElementById('mode-label');
            label.innerText = isOverworldToNether ? "Overworld ➔ Nether" : "Nether ➔ Overworld";
            convert();
        }

        function convert() {
            const x = parseFloat(document.getElementById('xIn').value) || 0;
            const z = parseFloat(document.getElementById('zIn').value) || 0;
            let resX, resZ;

            if (isOverworldToNether) {
                resX = Math.floor(x / 8);
                resZ = Math.floor(z / 8);
            } else {
                resX = Math.floor(x * 8);
                resZ = Math.floor(z * 8);
            }

            document.getElementById('output').innerText = `X: ${resX} | Z: ${resZ}`;
        }
    </script>
</body>
</html>
