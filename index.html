<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Coord Converter | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #ff4d4d;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Nether Ambient Glow */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #3a0a0a 0%, transparent 70%);
            z-index: -1;
            opacity: 0.6;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
        }

        h1 { font-weight: 800; font-size: 1.5rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .sub { font-size: 0.75rem; color: #666; margin-bottom: 25px; }

        .btn-switch {
            background: white;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 30px;
            transition: 0.2s;
        }

        .btn-switch:hover { transform: scale(1.05); background: var(--accent); color: white; }

        input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 12px;
            color: white;
            margin-bottom: 15px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--accent); }

        .result-area {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 77, 77, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 77, 77, 0.2);
        }

        #output { font-size: 1.4rem; font-weight: 700; color: var(--accent); margin-bottom: 10px; }

        .btn-copy {
            font-size: 0.7rem;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #aaa;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-copy:hover { color: white; background: rgba(255,255,255,0.2); }

        .footer {
            position: absolute;
            bottom: 20px;
            right: 25px;
            font-size: 0.7rem;
            color: #444;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>CONVERTER</h1>
        <div class="sub" id="mode-label">OVERWORLD ➔ NETHER</div>
        
        <button class="btn-switch" onclick="toggleMode()">MODUS ÄNDERN</button>

        <input type="number" id="xIn" placeholder="X-Koordinate" oninput="convert()">
        <input type="number" id="zIn" placeholder="Z-Koordinate" oninput="convert()">

        <div class="result-area">
            <div id="output">X: 0 | Z: 0</div>
            <button class="btn-copy" onclick="copyResult()">KOPIEREN</button>
        </div>
    </div>

    <div class="footer">made by kommebald</div>

    <script>
        let isOW = true;

        function toggleMode() {
            isOW = !isOW;
            document.getElementById('mode-label').innerText = isOW ? "OVERWORLD ➔ NETHER" : "NETHER ➔ OVERWORLD";
            convert();
        }

        function convert() {
            const x = parseFloat(document.getElementById('xIn').value) || 0;
            const z = parseFloat(document.getElementById('zIn').value) || 0;
            let rx = isOW ? Math.floor(x / 8) : Math.floor(x * 8);
            let rz = isOW ? Math.floor(z / 8) : Math.floor(z * 8);
            document.getElementById('output').innerText = `X: ${rx} | Z: ${rz}`;
        }

        function copyResult() {
            const text = document.getElementById('output').innerText;
            navigator.clipboard.writeText(text);
            alert("Kopiert: " + text);
        }
    </script>
</body>
</html>
