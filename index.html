<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Converter | Animated</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nether-color: #ff4d4d;
            --overworld-color: #2ecc71;
            --current-accent: var(--nether-color);
            --bg-dark: #050505;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background 0.8s ease;
        }

        /* Dynamischer Hintergrund-Glow */
        .glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, var(--current-accent) 0%, transparent 70%);
            z-index: -1;
            opacity: 0.3;
            transition: 0.8s ease;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            width: 350px;
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Animation beim Modus-Wechsel */
        .card.bump { transform: scale(1.05); }

        h1 { font-weight: 800; font-size: 1.5rem; margin-bottom: 5px; letter-spacing: 2px; }
        .sub { font-size: 0.75rem; color: #888; margin-bottom: 25px; transition: 0.3s; }

        .btn-switch {
            background: white;
            color: black;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            margin-bottom: 30px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }

        .btn-switch:hover { transform: translateY(-3px); box-shadow: 0 8px 20px var(--current-accent); }
        .btn-switch:active { transform: scale(0.95); }

        input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            color: white;
            margin-bottom: 15px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--current-accent); background: rgba(0,0,0,0.7); }

        .result-area {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #output { font-size: 1.6rem; font-weight: 800; color: var(--current-accent); margin-bottom: 10px; transition: 0.5s; }

        .btn-copy {
            font-size: 0.7rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #aaa;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-copy:hover { color: white; background: var(--current-accent); border-color: transparent; }

        .footer {
            position: absolute;
            bottom: 20px;
            right: 25px;
            font-size: 0.75rem;
            color: #555;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="glow" id="bg-glow"></div>

    <div class="card" id="main-card">
        <h1>CONVERTER</h1>
        <div class="sub" id="mode-label">OVERWORLD ➔ NETHER</div>
        
        <button class="btn-switch" onclick="toggleMode()">MODUS ÄNDERN</button>

        <input type="number" id="xIn" placeholder="X" oninput="convert()">
        <input type="number" id="zIn" placeholder="Z" oninput="convert()">

        <div class="result-area">
            <div id="output">X: 0 | Z: 0</div>
            <button class="btn-copy" onclick="copyResult()">KOPIEREN</button>
        </div>
    </div>

    <div class="footer">made by kommebald</div>

    <script>
        let isOW = true;

        function toggleMode() {
            isOW = !isOW;
            const root = document.documentElement;
            const card = document.getElementById('main-card');
            const label = document.getElementById('mode-label');

            // Animation triggern
            card.classList.add('bump');
            setTimeout(() => card.classList.remove('bump'), 400);

            // Farben und Texte ändern
            if (isOW) {
                root.style.setProperty('--current-accent', 'var(--nether-color)');
                label.innerText = "OVERWORLD ➔ NETHER";
            } else {
                root.style.setProperty('--current-accent', 'var(--overworld-color)');
                label.innerText = "NETHER ➔ OVERWORLD";
            }
            
            convert();
        }

        function convert() {
            const x = parseFloat(document.getElementById('xIn').value) || 0;
            const z = parseFloat(document.getElementById('zIn').value) || 0;
            let rx = isOW ? Math.floor(x / 8) : Math.floor(x * 8);
            let rz = isOW ? Math.floor(z / 8) : Math.floor(z * 8);
            document.getElementById('output').innerText = `X: ${rx} | Z: ${rz}`;
        }

        function copyResult() {
            const text = document.getElementById('output').innerText;
            navigator.clipboard.writeText(text);
            const btn = document.querySelector('.btn-copy');
            btn.innerText = "KOPIERT!";
            setTimeout(() => btn.innerText = "KOPIEREN", 2000);
        }
    </script>
</body>
</html>
